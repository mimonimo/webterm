<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#bc8cff"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="112" height="112" rx="20" stroke="url(#g1)" stroke-width="3" fill="#0d1117"/>
  <!-- Terminal window -->
  <rect x="16" y="22" width="88" height="76" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <!-- Title bar dots -->
  <circle cx="28" cy="32" r="3.5" fill="#f85149"/>
  <circle cx="38" cy="32" r="3.5" fill="#d29922"/>
  <circle cx="48" cy="32" r="3.5" fill="#3fb950"/>
  <!-- Terminal prompt -->
  <text x="24" y="54" fill="#3fb950" font-family="monospace" font-size="12" font-weight="bold">$</text>
  <text x="34" y="54" fill="#58a6ff" font-family="monospace" font-size="12">ssh</text>
  <text x="56" y="54" fill="#e6edf3" font-family="monospace" font-size="12">server</text>
  <!-- Cursor -->
  <rect x="24" y="62" width="7" height="14" fill="#58a6ff" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.2s" repeatCount="indefinite"/>
  </rect>
  <!-- Connection lines -->
  <text x="24" y="86" fill="#8b949e" font-family="monospace" font-size="9">Connected &#10003;</text>
</svg>
